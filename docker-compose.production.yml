version: '3.8'

# 生产环境网络配置
networks:
  xiaonuo-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.default_bridge: 'false'
      com.docker.network.bridge.enable_icc: 'true'
      com.docker.network.bridge.enable_ip_masquerade: 'true'
      com.docker.network.bridge.name: 'xiaonuo_production_bridge'
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# 持久化卷
volumes:
  # 后端数据卷
  backend-cert:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './backend/cert'
  backend-logs:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './backend/logs'
  
  # 前端数据卷
  frontend-static:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: './frontend/dist'
  
  # 监控数据卷
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

# 服务配置
services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-latest}
        BUILD_TIME: ${BUILD_TIME:-$(date +%Y-%m-%d_%H:%M:%S)}
        BUILD_COMMIT: ${BUILD_COMMIT:-local}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend-static:/usr/share/nginx/html:ro
      - ./xiaonuo.top_nginx:/etc/nginx/ssl:ro
    networks:
      - xiaonuo-network
      - monitoring-network
    restart: always
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '512M'
        reservations:
          cpus: '0.5'
          memory: '256M'
    # 安全配置
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: ${BUILD_VERSION:-latest}
        BUILD_TIME: ${BUILD_TIME:-$(date +%Y-%m-%d_%H:%M:%S)}
        BUILD_COMMIT: ${BUILD_COMMIT:-local}
    ports:
      - "3001:3001"
    volumes:
      - backend-cert:/app/cert:ro
      - backend-logs:/app/logs
    networks:
      - xiaonuo-network
      - monitoring-network
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=production
      - DB_HOST=mongoreplicab95890613e560.mongodb.cn-beijing.ivolces.com,mongoreplicab95890613e561.mongodb.cn-beijing.ivolces.com,mongoreplicab95890613e562.mongodb.cn-beijing.ivolces.com
      - DB_PORT=3717
      - DB_NAME=xiaonuo-mongodb
      - DB_USER=root
      - DB_PASSWORD=Xn2026_MongoDB
      - MONGO_URI=mongodb://root:Xn2026_MongoDB@mongoreplicab95890613e560.mongodb.cn-beijing.ivolces.com:3717,mongoreplicab95890613e561.mongodb.cn-beijing.ivolces.com:3717/xiaonuo-mongodb?authSource=admin&replicaSet=rs-mongo-replica-b95890613e56&retryWrites=true
      - JWT_SECRET=xiaonuo_jwt_secret_key_2026
      - JWT_EXPIRES_IN=7d
      - CORS_ORIGIN=https://xiaonuo.top,http://localhost:5173
      - ARK_API_KEY=0a209a91-9cfe-46bc-a138-2090f3658523
      - AI_MODEL=doubao-seed-1-8-251228
      - TOS_ACCESS_KEY_ID=YOUR_TOS_ACCESS_KEY_ID
      - TOS_ACCESS_KEY_SECRET=TnpVMk5XTTVObVUyTmpOaE5HWmhNamxrWmpJeE9XSXpZakl5TXpnMU1UWQ==
      - TOS_BUCKET=xiaonuotos1
      - WECHAT_APPID=wx539922c487ccc916
      - WECHAT_MCHID=1698261141
      - WECHAT_API_KEY=15987idnjejgityjviuehjnmhkoce54d
      - WECHAT_NOTIFY_URL=https://xiaonuo.top/api/wechat/notify
      - WECHAT_SANDBOX=true
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '1G'
        reservations:
          cpus: '1.0'
          memory: '512M'
    # 安全配置
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ulimits:
      nproc: 1024
      nofile:
        soft: 65536
        hard: 65536

  # 监控服务
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring-network
      - xiaonuo-network
    restart: always
    depends_on:
      - backend
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '512M'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-network
    restart: always
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=xiaonuo2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '512M'

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - alertmanager-data:/alertmanager
    networks:
      - monitoring-network
    restart: always
    depends_on:
      - prometheus
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9093"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '256M'

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - monitoring-network
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '128M'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    networks:
      - monitoring-network
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '128M'
