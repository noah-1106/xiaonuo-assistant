# Gitee CI 配置文件
# 用于自动化构建和部署小诺智能助理

stages:
  - build
  - test
  - security
  - deploy

# 环境变量
environment:
  BUILD_VERSION: $(date +%Y%m%d.%H%M%S)
  BUILD_TIME: $(date +%Y-%m-%d_%H:%M:%S)
  BUILD_COMMIT: $(git rev-parse --short HEAD)
  VOLCENGINE_CR_REGISTRY: xiaonuo-cn-beijing.cr.volces.com
  VOLCENGINE_CR_NAMESPACE: xiaonuo
  VOLCENGINE_CR_ACCESS_KEY: $VOLCENGINE_CR_ACCESS_KEY
  VOLCENGINE_CR_SECRET_KEY: $VOLCENGINE_CR_SECRET_KEY

# 构建阶段
build-job:
  stage: build
  script:
    - echo "开始构建项目"
    - echo "构建版本: $BUILD_VERSION"
    - echo "构建时间: $BUILD_TIME"
    - echo "构建提交: $BUILD_COMMIT"
    
    # 安装依赖管理工具
    - npm install -g pnpm
    
    # 构建前端
    - echo "构建前端项目"
    - cd frontend
    - pnpm install
    - pnpm run build
    - cd ..
    
    # 构建后端
    - echo "构建后端项目"
    - cd backend
    - npm install --legacy-peer-deps
    - cd ..
    
    # 登录到火山引擎容器镜像服务
    - echo "登录到火山引擎容器镜像服务"
    - echo "$VOLCENGINE_CR_SECRET_KEY" | docker login "$VOLCENGINE_CR_REGISTRY" -u "$VOLCENGINE_CR_ACCESS_KEY" --password-stdin
    
    # 定义镜像标签
    - export FRONTEND_IMAGE="$VOLCENGINE_CR_REGISTRY/$VOLCENGINE_CR_NAMESPACE/frontend:$BUILD_VERSION"
    - export BACKEND_IMAGE="$VOLCENGINE_CR_REGISTRY/$VOLCENGINE_CR_NAMESPACE/backend:$BUILD_VERSION"
    - export FRONTEND_IMAGE_LATEST="$VOLCENGINE_CR_REGISTRY/$VOLCENGINE_CR_NAMESPACE/frontend:latest"
    - export BACKEND_IMAGE_LATEST="$VOLCENGINE_CR_REGISTRY/$VOLCENGINE_CR_NAMESPACE/backend:latest"
    
    - echo "前端镜像: $FRONTEND_IMAGE"
    - echo "后端镜像: $BACKEND_IMAGE"
    
    # 构建 Docker 镜像
    - echo "构建 Docker 镜像"
    - docker build -t "$FRONTEND_IMAGE" -t "$FRONTEND_IMAGE_LATEST" -f frontend/Dockerfile frontend
    - docker build -t "$BACKEND_IMAGE" -t "$BACKEND_IMAGE_LATEST" -f backend/Dockerfile backend
    
    # 推送镜像到火山引擎容器镜像服务
    - echo "推送镜像到火山引擎容器镜像服务"
    - docker push "$FRONTEND_IMAGE"
    - docker push "$FRONTEND_IMAGE_LATEST"
    - docker push "$BACKEND_IMAGE"
    - docker push "$BACKEND_IMAGE_LATEST"
    
    # 生成构建报告
    - bash build.sh --env=production --version=$BUILD_VERSION
  artifacts:
    paths:
      - build-report-*.txt
      - frontend/dist/
    expire_in: 1 day

# 测试阶段
test-job:
  stage: test
  script:
    - echo "开始运行测试"
    
    # 运行后端测试
    - cd backend
    - npm test -- --silent
    - cd ..
    
    # 运行前端测试
    - cd frontend
    - pnpm test
    - cd ..

# 安全扫描阶段
security-job:
  stage: security
  script:
    - echo "开始安全扫描"
    - bash security-scan.sh
  artifacts:
    paths:
      - security-scan-*.txt
    expire_in: 1 day

# 部署阶段
deploy-job:
  stage: deploy
  script:
    - echo "开始部署到生产服务器"
    
    # 配置 SSH
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
    
    # 部署到生产服务器
    - echo "部署到生产服务器"
    - bash deploy.sh --full --env=production --registry="$VOLCENGINE_CR_REGISTRY" --namespace="$VOLCENGINE_CR_NAMESPACE"
    
    # 验证部署结果
    - echo "验证部署结果"
    - curl -s https://xiaonuo.top/api/health
  environment:
    name: production
    url: https://xiaonuo.top
  only:
    - main
    - master

# 部署到测试环境
test-deploy-job:
  stage: deploy
  script:
    - echo "开始部署到测试服务器"
    - bash deploy.sh --env=staging --registry="$VOLCENGINE_CR_REGISTRY" --namespace="$VOLCENGINE_CR_NAMESPACE"
  environment:
    name: staging
    url: https://staging.xiaonuo.top
  only:
    - develop
  when: manual
