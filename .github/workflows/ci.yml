name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        pnpm install
    
    - name: Lint frontend
      run: |
        cd frontend
        pnpm run lint
    
    - name: Install backend dependencies
      run: |
        cd backend
        pnpm install
    
    - name: Lint backend
      run: |
        cd backend
        pnpm run lint

  test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Install backend dependencies
      run: |
        cd backend
        pnpm install
    
    - name: Run backend tests
      run: |
        cd backend
        pnpm test
      env:
        NODE_ENV: test
        MONGO_URI: mongodb://localhost:27017/xiaonuo_test
        JWT_SECRET: test-secret-key

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 8
    
    - name: Build frontend
      run: |
        cd frontend
        pnpm install
        pnpm run build
    
    - name: Build backend
      run: |
        cd backend
        pnpm install
        pnpm run build
